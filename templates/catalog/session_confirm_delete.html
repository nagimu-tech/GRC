{% extends "base.html" %}
{% block title %}Удалить запуск{% endblock %}
{% block content %}
<div class="max-w-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Удалить запуск?</h1>
    <p class="text-gray-600 mb-6">Вы уверены, что хотите удалить запуск <strong>{{ object.label }}</strong>? Все участия в этом запуске также будут удалены.</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex gap-3">
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'catalog:course_detail' object.course_id %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
