{% extends "base.html" %}
{% block title %}Выбор компании{% endblock %}
{% block content %}
<div class="max-w-md">
    <div class="flex items-center mb-6">
        <a href="{% url 'accounts:dashboard' %}" class="text-gray-400 hover:text-gray-600 mr-3">←</a>
        <h1 class="text-2xl font-bold text-gray-800">Выбор активной компании</h1>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        {% if current_company %}
        <p class="text-sm text-gray-500 mb-4">Текущая компания: <strong>{{ current_company.name }}</strong></p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Компания</label>
                {{ form.company }}
            </div>
            <button type="submit" class="btn btn-primary">Применить</button>
        </form>
    </div>
</div>
{% endblock %}
